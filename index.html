
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #1a0000, #000);
  color: white;
  font-family: Arial;
}

#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.5em;
}

#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.6em;
}

#rose {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  transform: translate(-50%, -50%);
  animation: spin 10s linear infinite;
  filter: drop-shadow(0 0 20px red);
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.petal {
  position: absolute;
  width: 15px;
  height: 20px;
  background: radial-gradient(circle, #ff4d6d, #800020);
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity:0; }
  20% { opacity:1; }
  100% { transform: translateY(110vh); opacity:0; }
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>
<div id="bottomText">Te quiero ver cada minuto</div>

<!-- EMBEDDED ROSE -->
<img id="rose" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500">

<script>
for (let i = 0; i < 30; i++) {
  const p = document.createElement("div");
  p.className = "petal";

  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random()*4) + "s";

  document.body.appendChild(p);
}
</script>

</body>
</html>
